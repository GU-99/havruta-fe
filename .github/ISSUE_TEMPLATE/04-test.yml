name: 🧪 테스트
description: 테스트와 관련된 작업이 필요한가요?
labels: ["🧪 Test"]
projects: ["GU-99/5"]
body:
  - type: textarea
    attributes:
      label: 🎯 작업 목표
      description: "이 작업의 목표와 기대 결과를 설명해주세요."
      placeholder: "예: Input 컴포넌트의 유닛 테스트 작성, Login 컴포넌트의 통합 테스트 작성 등"
    validations:
      required: true

  - type: textarea
    attributes:
      label: ✅ 작업할 내용
      description: "작업을 수행하기 위한 단계를 간단히 설명해주세요."
      placeholder: |
        1. Login 컴포넌트의 로그인 로직 테스트 추가
        2. 로그인 후 반환되는 결과값을 Mock으로 대체
        3. `beforeEach` 및 `afterEach`로 공통 설정 최소화
        4. 테스트 실행 시간 측정 및 결과 확인
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🔗 참고 자료
      description: "작업과 관련해서 참고할 만한 자료나 링크가 있다면 제공해주세요."
      placeholder: "참고할 자료나 링크를 입력해주세요."
    validations:
      required: false
