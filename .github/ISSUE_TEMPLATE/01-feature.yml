name: 🌟 기능
description: 새로운 기능이 있나요?
labels: ["🌟 Feature"]
projects: ["GU-99/5"]
body:
  - type: textarea
    attributes:
      label: 📄 기능 설명
      description: "추가하고자 하는 새로운 기능에 대해 설명해주세요."
      placeholder: "제안하시는 기능을 자세히 설명해주세요."
    validations:
      required: true

  - type: textarea
    attributes:
      label: ✅ 작업할 내용
      description: "해당 기능을 구현하기 위해 필요한 작업 내용을 구체적으로 작성해주세요."
      placeholder: |
        - [ ] 로그인 UI 작성
        - [ ] JWT 토큰 요청 로직 추가
        - [ ] Access Token 인메모리 저장 로직 추가
        - [ ] 로그인 테스트 코드 추가
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🔗 참고 자료
      description: "작업과 관련해서 참고할 만한 자료나 링크가 있다면 제공해주세요."
      placeholder: "참고할 자료나 링크를 입력해주세요."
    validations:
      required: false